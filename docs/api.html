<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nexus Sentinel — API reference</title>
    <meta
      name="description"
      content="OpenAPI reference for Nexus Sentinel — the POST /v1/verify prompt-firewall API."
    />
    <link rel="icon" href="./img/favicon.svg" />
    <style>
      body {
        margin: 0;
        background: #050805;
      }
      /* Thin branded banner linking back to the explainer / live demo. */
      .nx-bar {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        background: #060d08;
        color: #b6f5c8;
        border-bottom: 1px solid rgba(125, 255, 160, 0.18);
        padding: 10px 16px;
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .nx-bar strong {
        color: #7dffa0;
      }
      .nx-bar a {
        color: #7dffa0;
        text-decoration: none;
      }
      .nx-bar a:hover {
        text-decoration: underline;
      }
      /* Brand Scalar's dark theme green to match the dashboard. */
      .dark-mode {
        --scalar-color-accent: #22c55e;
        --scalar-color-green: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="nx-bar">
      <strong>🛡️ Nexus Sentinel · API</strong>
      <a href="./how-it-works.html">← Explainer</a>
      <a href="https://d1nm6g34nlk82m.cloudfront.net/">Live demo</a>
      <a href="https://github.com/arifdewiuae/NEXUS_SENTINEL">GitHub</a>
    </div>

    <!-- Scalar API reference — built-in dark theme (unlike Redoc, it themes
         every panel, so no per-element overrides are needed). -->
    <script
      id="api-reference"
      data-url="./openapi.json"
      data-configuration='{"darkMode":true,"hideDarkModeToggle":true,"theme":"default","hideClientButton":true}'
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
